<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please sign in</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 50px 0;
        }

        .top-links {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .top-links a {
            text-decoration: none;
            color: black;
            font-size: 16px;
        }

        .top-links a:hover {
            text-decoration: underline;
        }

        .login-container {
            max-width: 330px;
            margin: 0 auto;
            padding: 15px;
        }

        .login-form {
            background: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        .oauth-btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .google-btn {
            background-color: #db4437;
            color: white;
        }

        .google-btn:hover {
            background-color: #c23321;
        }

        .github-btn {
            background-color: #333;
            color: white;
        }

        .github-btn:hover {
            background-color: #111;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #aaa;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="top-links">
    <a href="/index">Homepage</a>
    <a href="/logout" onclick="document.getElementById('logoutForm').submit(); return false;">Logout</a>
    <form id="logoutForm" action="/logout" method="post" style="display:none;"></form>
</div>

<div class="login-container">
    <form class="login-form" action="/login" method="post">
        <h2>Please sign in</h2>

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Sign in</button>

        <div class="divider">or continue with</div>

        <a href="/oauth2/authorization/google" class="oauth-btn google-btn">Sign in with Google</a>
        <a href="/oauth2/authorization/github" class="oauth-btn github-btn">Sign in with GitHub</a>
    </form>
</div>

</body>
</html>
